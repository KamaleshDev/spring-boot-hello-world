apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-hello-world
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-hello-world
  template:
    metadata:
      labels:
        app: spring-hello-world
    spec:
      containers:
      - name: spring-hello-world
        image: yourdockerhubusername/hello-world-spring:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
